schema_version: 1
timezone: America/New_York
trading_days_only: true

# v1 active routines (as of 2026-05-12):
#   pre_market           — research only (no entries)
#   market_open          — MONITORING only (no new entries)
#   midday               — MONITORING only (no new entries)
#   pre_close            — MONITORING only (no new entries, scans overnight risk)
#   end_of_day           — paper-trade decision point (the only routine that opens positions)
#   self_learning_review — observations-only
#
# Intraday routines (market_open / midday / pre_close) are monitoring layers — they consult
# `lib.portfolio_health` and `lib.portfolio_risk` to refresh the circuit-breaker and propose
# closes when stops/targets/overnight-risk triggers fire. They MUST NOT open new positions.
# Entry signals from `lib.signals` are only acted on by `end_of_day` against closing prices.
# See plan.md > "Intraday monitoring routines — landed 2026-05-12".
routines:
  pre_market:
    cron: "30 6 * * 1-5"      # 06:30 ET, Mon-Fri
    prompt: prompts/routines/pre_market.md
    halt_on_error: false
    enabled: true
    phase: v1

  end_of_day:
    cron: "30 16 * * 1-5"     # 16:30 ET, Mon-Fri
    prompt: prompts/routines/end_of_day.md
    halt_on_error: true
    enabled: true
    phase: v1

  market_open:
    cron: "35 9 * * 1-5"      # 09:35 ET (5 min after open)
    prompt: prompts/routines/market_open.md
    halt_on_error: false
    enabled: true
    phase: v1

  midday:
    cron: "0 12 * * 1-5"      # 12:00 ET
    prompt: prompts/routines/midday.md
    halt_on_error: false
    enabled: true
    phase: v1

  pre_close:
    cron: "30 15 * * 1-5"     # 15:30 ET
    prompt: prompts/routines/pre_close.md
    halt_on_error: false
    enabled: true
    phase: v1

  weekly_review:
    cron: "0 9 * * 6"         # Saturday 09:00 ET
    prompt: prompts/routines/weekly_review.md
    halt_on_error: false
    enabled: false
    phase: v2

  monthly_review:
    cron: "0 9 1 * *"         # 1st of month 09:00 ET
    prompt: prompts/routines/monthly_review.md
    halt_on_error: false
    enabled: false
    phase: v2

  self_learning_review:
    cron: "0 10 * * 0"        # Sunday 10:00 ET — observations-only in v1
    prompt: prompts/routines/self_learning_review.md
    halt_on_error: false
    enabled: true
    phase: v1
